<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Expense</title>
</head>
<body>
    <div class="container">
        <div class="sub-container" id="display">
            <div class="form-container">
                <form>
                    <input type="text" placeholder="Enter the product" id="expense-name">
                    <input type="text"  placeholder="Enter the price" id="expense-price">
                     <input type="submit" id="submit">
                </form>
            </div>
            <div class="table-container">
                <table  id="table">
                    <tr>
                        <th>Name</th>
                        <th>Price</th>
                    </tr>
                </table>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
